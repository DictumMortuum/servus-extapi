replicaCount: 1

image:
  repository: archivebox/archivebox
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8000

httpRoute:
  enabled: false

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: WaybackMachine
    gethomepage.dev/group: Media
    gethomepage.dev/icon: archivebox
    gethomepage.dev/name: ArchiveBox
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=archivebox"
  tls:
    - secretName: archivebox-tls
      hosts:
        - "archive.dictummortuum.com"
  hosts:
    - host: archive.dictummortuum.com
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  limits:
    cpu: 500m
  requests:
    cpu: 100m

livenessProbe: {}
readinessProbe: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumeMounts:
  - name: data
    mountPath: /data

volumes:
  - name: data
    persistentVolumeClaim:
      claimName: pvc-nfs-archivebox

nodeSelector: {}
tolerations: []
affinity: {}
